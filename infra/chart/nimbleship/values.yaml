api:
  image: nimbleship-api:dev
  # NEVER true in production: enables force-allocation and future test
  # tools (server-enforced 403 when false).
  testingTools: false
  # Before raising replicas above 1: boot runs `alembic upgrade head`, and
  # concurrent pods would race the migration. Move migrations to a Job or
  # pre-install hook first.
  replicas: 1

web:
  image: nimbleship-web:dev
  replicas: 1

postgres:
  image: postgres:17-alpine
  database: nimbleship
  user: nimbleship
  # Local development only. Real deployments override this via
  # --set or an external secret; it never ships to a shared environment.
  password: nimbleship-local
  storage: 1Gi

ingress:
  enabled: true
  className: traefik
  host: nimbleship.localhost
