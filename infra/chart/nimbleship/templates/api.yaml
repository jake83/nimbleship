apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app.kubernetes.io/name: nimbleship-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: nimbleship-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nimbleship-api
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres
                  key: database-url
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
spec:
  selector:
    app.kubernetes.io/name: nimbleship-api
  ports:
    - port: 8000
      targetPort: 8000
