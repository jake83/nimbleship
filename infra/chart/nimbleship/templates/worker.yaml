apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app.kubernetes.io/name: nimbleship-worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: nimbleship-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nimbleship-worker
    spec:
      containers:
        - name: worker
          # The api image: the worker is the same codebase consuming the
          # same database, only the entrypoint differs (ADR 0004).
          image: {{ .Values.api.image }}
          imagePullPolicy: IfNotPresent
          command: ["procrastinate", "--app=nimbleship.queue.queue_app", "worker"]
          env:
            - name: NIMBLESHIP_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres
                  key: database-url
          # No probes: the worker exposes no HTTP surface, and Procrastinate
          # exits on fatal errors - the Deployment restarts it. Until the api
          # pod has run the migrations, startup crash-loops harmlessly.
